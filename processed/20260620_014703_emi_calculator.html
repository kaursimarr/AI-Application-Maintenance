<!DOCTYPE html><html><head><title>Home Loan EMI Calculator</title><style>body {font-family: Arial, sans-serif;background-color: #f0f4f8;display: flex;justify-content: center;align-items: center;height: 100vh;margin: 0;} .calculator {background-color: #ffffff;padding: 40px;border-radius: 10px;box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);width: 350px;} h2 {text-align: center;color: #2c3e50;margin-bottom: 25px;} label {font-size: 14px;color: #555;font-weight: bold;} input {width: 100%;padding: 10px;margin: 8px 0 18px 0;border: 1px solid #ccc;border-radius: 6px;font-size: 14px;box-sizing: border-box;} input:focus {border-color: #3498db;outline: none;} button {width: 100%;padding: 12px;background-color: #ff69b4;color: white;border: none;border-radius: 6px;font-size: 16px;cursor: pointer;} button:hover {background-color: #ff99cc;} .dashboard-btn {margin-top: 10px;background-color: #2c3e50;} .dashboard-btn:hover {background-color: #1a252f;} .reset-btn {margin-top: 10px;background-color: #ff9800;} .reset-btn:hover {background-color: #ffc107;} .result {margin-top: 20px;background-color: #eaf4fb;padding: 15px;border-radius: 6px;text-align: center;display: none;} .result label {font-size: 14px;color: #555;} .result span {display: block;font-size: 24px;font-weight: bold;color: #2c3e50;margin-top: 5px;} .error-message {color: red;font-size: 12px;margin-top: 5px;}</style></head><body><div class='calculator' role='main'><h2>Home Loan EMI Calculator</h2><label for='loanAmount'>Loan Amount (Rs.)</label><input type='number' id='loanAmount' placeholder='e.g. 500000' aria-labelledby='loanAmount-label' aria-describedby='loanAmount-error' oninput='validateInput(this)'><div id='loanAmount-error' class='error-message'></div><label for='interestRate' id='interestRate-label'>Interest Rate (% per annum)</label><input type='number' id='interestRate' placeholder='e.g. 8.5' aria-labelledby='interestRate-label' aria-describedby='interestRate-error' oninput='validateInput(this)'><div id='interestRate-error' class='error-message'></div><label for='duration'>Duration (in months)</label><input type='number' id='duration' placeholder='e.g. 240' aria-labelledby='duration' aria-describedby='duration-error' oninput='validateInput(this)'><div id='duration-error' class='error-message'></div><button onclick='calculateEMI()' aria-label='Calculate EMI'>Calculate EMI</button><button class='dashboard-btn' onclick='location.href="/dashboard"' aria-label='Go to Maintenance Dashboard'>Maintenance Dashboard</button><button class='reset-btn' onclick='resetForm()' aria-label='Reset Form'>Reset</button><div class='result' id='resultBox'><label>Your Monthly EMI</label><span id='emiResult'></span></div></div><script>function validateInput(input) {const value = input.value;if (value === '') {return;}const errorMessageId = input.id + '-error';const errorMessage = document.getElementById(errorMessageId);if (isNaN(value) || value < 0) {errorMessage.textContent = 'Please enter a valid and positive value.';input.classList.add('error');} else {errorMessage.textContent = '';input.classList.remove('error');}} function calculateEMI() {const loanAmount = document.getElementById('loanAmount');const interestRate = document.getElementById('interestRate');const duration = document.getElementById('duration');if (loanAmount.classList.contains('error') || interestRate.classList.contains('error') || duration.classList.contains('error')) {return;}const P = parseFloat(loanAmount.value);const R = parseFloat(interestRate.value) / 12 / 100;const N = parseFloat(duration.value);if (isNaN(P) || isNaN(R) || isNaN(N) || P < 0 || R < 0 || N < 0) {loanAmount.classList.add('error');interestRate.classList.add('error');duration.classList.add('error');return;}const EMI = P * R * Math.pow(1 + R, N) / (Math.pow(1 + R, N) - 1);document.getElementById('emiResult').textContent = 'Rs. ' + EMI.toFixed(2);document.getElementById('resultBox').style.display = 'block';loanAmount.classList.remove('error');interestRate.classList.remove('error');duration.classList.remove('error');} function resetForm() {document.getElementById('loanAmount').value = '';document.getElementById('interestRate').value = '';document.getElementById('duration').value = '';document.getElementById('resultBox').style.display = 'none';document.getElementById('loanAmount').classList.remove('error');document.getElementById('interestRate').classList.remove('error');document.getElementById('duration').classList.remove('error');}</script></body></html>
