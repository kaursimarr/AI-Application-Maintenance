<!DOCTYPE html><html><head><title>Home Loan EMI Calculator</title><style>body {font-family: Arial, sans-serif;background-color: #f0f4f8;display: flex;justify-content: center;align-items: center;height: 100vh;margin: 0;} .calculator {background-color: #ffffff;padding: 40px;border-radius: 10px;box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);width: 350px;} h2 {text-align: center;color: #2c3e50;margin-bottom: 25px;} label {font-size: 14px;color: #555;font-weight: bold;} input {width: 100%;padding: 10px;margin: 8px 0 18px 0;border: 1px solid #ccc;border-radius: 6px;font-size: 14px;box-sizing: border-box;} input:focus {border-color: #3498db;outline: none;} button {width: 100%;padding: 12px;background-color: #ff69b4;color: white;border: none;border-radius: 6px;font-size: 16px;cursor: pointer;} button:hover {background-color: #ff99cc;} .dashboard-btn {margin-top: 10px;background-color: #2c3e50;} .dashboard-btn:hover {background-color: #1a252f;} .reset-btn {margin-top: 10px;background-color: #ff9800;} .reset-btn:hover {background-color: #ffc107;} .result {margin-top: 20px;background-color: #eaf4fb;padding: 15px;border-radius: 6px;text-align: center;display: none;} .result label {font-size: 14px;color: #555;} .result span {display: block;font-size: 24px;font-weight: bold;color: #2c3e50;margin-top: 5px;} .error-message {color: red;margin-bottom: 10px;}</style></head><body><div class="calculator"><h2> Home Loan EMI Calculator</h2><label>Loan Amount (Rs.)</label><input type="number" id="loanAmount" placeholder="e.g. 500000" oninput="validateInput(this)"><label>Interest Rate (% per annum)</label><input type="number" id="interestRate" placeholder="e.g. 8.5" oninput="validateInput(this)"><label>Duration (in months)</label><input type="number" id="duration" placeholder="e.g. 240" oninput="validateInput(this)"><div class="error-message" id="error-message"></div><button onclick="calculateEMI()">Calculate EMI</button><button class="dashboard-btn" onclick="location.href='/dashboard'">Maintenance Dashboard</button><button class="reset-btn" onclick="resetForm()">Reset</button><div class="result" id="resultBox"><label>Your Monthly EMI</label><span id="emiResult"></span></div></div><script>function validateInput(input) {const errorMessage = document.getElementById('error-message');if (input.value < 0) {errorMessage.innerText = 'Please enter a positive number.';input.style.border = '1px solid red';} else {errorMessage.innerText = '';input.style.border = '1px solid #ccc';}}function calculateEMI() {const loanAmount = parseFloat(document.getElementById('loanAmount').value);const interestRate = parseFloat(document.getElementById('interestRate').value);const duration = parseFloat(document.getElementById('duration').value);const errorMessage = document.getElementById('error-message');if (isNaN(loanAmount) || isNaN(interestRate) || isNaN(duration)) {errorMessage.innerText = 'Please enter valid values in all fields.';return;} if (loanAmount <= 0 || interestRate <= 0 || duration <= 0) {errorMessage.innerText = 'Please enter positive values in all fields.';return;} const monthlyInterestRate = interestRate / 12 / 100;const monthlyEMI = loanAmount * monthlyInterestRate * Math.pow(1 + monthlyInterestRate, duration) / (Math.pow(1 + monthlyInterestRate, duration) - 1);document.getElementById('emiResult').innerHTML = 'Rs. ' + monthlyEMI.toFixed(2);document.getElementById('resultBox').style.display = 'block';}function resetForm() {document.getElementById('loanAmount').value = '';document.getElementById('interestRate').value = '';document.getElementById('duration').value = '';document.getElementById('resultBox').style.display = 'none';document.getElementById('error-message').innerText = '';}</script></body></html>
