<!DOCTYPE html>
<html>
<head>
  <title>Home Loan EMI Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .calculator {
      background-color: #ffffff;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      width: 350px;
    }

    h2 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 25px;
    }

    label {
      font-size: 14px;
      color: #555;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0 18px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }

    input:focus {
      border-color: #3498db;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #964B00;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.2s ease-in-out;
    }

    button:hover {
      background-color: #786C3B;
    }

    .dashboard-btn {
      margin-top: 10px;
      background-color: #786C3B;
    }

    .dashboard-btn:hover {
      background-color: #786C3B;
    }

    .result {
      margin-top: 20px;
      background-color: #eaf4fb;
      padding: 15px;
      border-radius: 6px;
      text-align: center;
      display: none;
    }

    .result label {
      font-size: 14px;
      color: #555;
    }

    .result span {
      display: block;
      font-size: 24px;
      font-weight: bold;
      color: #2c3e50;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <h2> Home Loan EMI Calculator</h2>

    <label>Loan Amount (Rs.)</label>
    <input type="number" id="loanAmount" placeholder="e.g. 500000">

    <label>Interest Rate (% per annum)</label>
    <input type="number" id="interestRate" placeholder="e.g. 8.5">

    <label>Duration (in months)</label>
    <input type="number" id="duration" placeholder="e.g. 240">

    <button onclick="calculateEMI()">Calculate EMI</button>
    <button onclick="location.href='/dashboard'" class="dashboard-btn">Maintenance Dashboard</button>

    <div class="result" id="resultBox">
      <label>Your Monthly EMI</label>
      <span id="emiResult"></span>
    </div>
  </div>

  <script>
    function calculateEMI() {
      var P = parseFloat(document.getElementById("loanAmount").value);
      var R = parseFloat(document.getElementById("interestRate").value) / 12 / 100;
      var N = parseFloat(document.getElementById("duration").value);

      if (isNaN(P) || isNaN(R) || isNaN(N)) {
        alert("Please enter valid values in all fields.");
        return;
      }

      var EMI = P * R * Math.pow(1 + R, N) / (Math.pow(1 + R, N) - 1);

      document.getElementById("emiResult").innerHTML = "Rs. " + EMI.toFixed(2);
      document.getElementById("resultBox").style.display = "block";
    }
  </script>

</body>
</html>
